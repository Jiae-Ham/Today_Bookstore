server:
  port: ${SERVER_PORT:8080}


spring:
  config:
    import:
      - optional:file:.env[.properties]
  application:
    name: bookserver
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.jvglpxrqqpnmmqzdfiqj
    password: ${SUPABASE_DB_PASSWORD} # 로컬 환경변수(SUPABASE_DB_PASSWORD)로 주입하세요. (Git 노출 방지)
    hikari:
      maximum-pool-size: 1 # 7명 이상 동시에 띄울 수 있도록 각 인원당 커넥션 개수를 1개로 제한합니다. (최대 15명 접속 가능)
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    open-in-view: false

openai:
  api-key: ${OPENAI_API_KEY:}

