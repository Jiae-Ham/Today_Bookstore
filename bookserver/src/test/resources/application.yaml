server:
  port: ${SERVER_PORT:8080}


spring:
  application:
    name: bookserver
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:bookdb
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    open-in-view: false

openai:
  api-key: ${OPENAI_API_KEY:}

